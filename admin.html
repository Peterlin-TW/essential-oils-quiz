<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>管理分析後台 - 香氣覺察</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background: #f4f7f6; font-family: sans-serif; padding: 30px; color: #333; }
    .container { max-width: 1000px; margin: 0 auto; }
    .card { background: white; border-radius: 15px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
    .tag { padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; color: white; }
    .tag-a { background: #ff9a62; } .tag-b { background: #7d6b5d; } .tag-c { background: #ffcc80; color: #333; } .tag-d { background: #a2d2ff; color: #333; }
    .count-badge { background: #fff3eb; color: #ff9a62; padding: 2px 8px; border-radius: 5px; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <h1>分析後台</h1>
  
  <div class="card">
    <canvas id="typeChart" style="max-height: 300px;"></canvas>
  </div>

  <div class="card">
    <h3>精油備貨合計表</h3>
    <table id="stockTable">
      <thead><tr><th>精油名稱</th><th>需求次數</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="card">
    <h3>詳細填答清單</h3>
    <table id="memberTable">
      <thead><tr><th>姓名/資訊</th><th>結果</th><th>建議精油</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
  const API_URL = "您的GAS部署網址?type=admin";
  const typeMap = {
    'TypeA': { name: '黃金能量', class: 'tag-a' },
    'TypeB': { name: '幸福光芒', class: 'tag-b' },
    'TypeC': { name: '沉靜心流', class: 'tag-c' },
    'TypeD': { name: '自信綻放', class: 'tag-d' }
  };

  async function loadData() {
    const res = await fetch(API_URL);
    const data = await res.json();
    render(data.reverse());
  }

  function render(data) {
    const typeCounts = { TypeA:0, TypeB:0, TypeC:0, TypeD:0 };
    const stockCounts = {};
    const memberBody = document.querySelector('#memberTable tbody');
    const stockBody = document.querySelector('#stockTable tbody');

    data.forEach(item => {
      typeCounts[item.resultType]++;
      // 統計精油
      if(item.selectedProducts) {
        item.selectedProducts.split('、').forEach(p => {
          stockCounts[p] = (stockCounts[p] || 0) + 1;
        });
      }
      // 渲染清單
      const info = typeMap[item.resultType] || { name: item.resultType, class: '' };
      memberBody.innerHTML += `
        <tr>
          <td><b>${item.name}</b><br><small>${item.contact}</small></td>
          <td><span class="tag ${info.class}">${info.name}</span></td>
          <td>${item.selectedProducts}</td>
        </tr>
      `;
    });

    // 渲染合計表
    Object.entries(stockCounts).sort((a,b)=>b[1]-a[1]).forEach(([name, count]) => {
      stockBody.innerHTML += `<tr><td>${name}</td><td><span class="count-badge">${count}</span></td></tr>`;
    });

    // 圓餅圖
    new Chart(document.getElementById('typeChart'), {
      type: 'pie',
      data: {
        labels: ['黃金能量', '幸福光芒', '沉靜心流', '自信綻放'],
        datasets: [{
          data: [typeCounts.TypeA, typeCounts.TypeB, typeCounts.TypeC, typeCounts.TypeD],
          backgroundColor: ['#ff9a62', '#7d6b5d', '#ffcc80', '#a2d2ff']
        }]
      }
    });
  }

  loadData();
</script>

</body>
</html>
