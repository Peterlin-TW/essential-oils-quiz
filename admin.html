<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>芳療諮詢後台</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
    .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    .tag { padding: 3px 8px; border-radius: 5px; font-size: 0.75rem; color: white; }
    .TypeA { background: #ff9a62; } .TypeB { background: #e5989b; } .TypeC { background: #829ab1; } .TypeD { background: #b19cd9; }
  </style>
</head>
<body>
  <h1>芳療問卷數據總覽</h1>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
    <div class="card"><canvas id="pieChart"></canvas></div>
    <div class="card"><h3>精油備貨統計</h3><div id="stockList"></div></div>
  </div>
  <div class="card">
    <h3>完整客戶名單</h3>
    <table>
      <thead><tr><th>時間</th><th>姓名</th><th>年齡/職業</th><th>壓力</th><th>測驗結果</th><th>情感記憶</th></tr></thead>
      <tbody id="list"></tbody>
    </table>
  </div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbw5NZ0PD2KK7mpJU-ORNLBeBqP4tsZp2MSWK0MkvBZJ6YVM1uGDmOJB3Mabg012bnRI/exec?type=admin";
  
  async function load() {
    const res = await fetch(API_URL);
    const data = await res.json();
    const typeCount = {TypeA:0, TypeB:0, TypeC:0, TypeD:0};
    const list = document.getElementById('list');
    
    data.reverse().forEach(d => {
      typeCount[d.resultType]++;
      list.innerHTML += `<tr>
        <td>${d.date.split(' ')[0]}</td>
        <td><b>${d.name}</b><br>${d.contact || ''}</td>
        <td>${d.age} / ${d.job}</td>
        <td>🔥 ${d.stressLevel || d.stressLevel}</td>
        <td><span class="tag ${d.resultType}">${d.resultTitle}</span></td>
        <td style="font-size:0.8rem; color:#666;">${d.smellMemory || '-'}</td>
      </tr>`;
    });

    new Chart(document.getElementById('pieChart'), {
      type: 'pie',
      data: { labels: ['能量', '幸福', '沉靜', '自信'], datasets: [{ data: Object.values(typeCount), backgroundColor: ['#ff9a62', '#e5989b', '#829ab1', '#b19cd9'] }] }
    });
  }
  load();
</script>
</body>
</html>
