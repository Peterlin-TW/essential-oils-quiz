<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>芳香精油探索旅程</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Noto Sans TC', sans-serif;
    }

    body {
      background: linear-gradient(180deg, #f6efe7 0%, #e9d9c6 100%);
      min-height: 100vh;
      overflow-x: hidden;
      color: #3b2f2f;
    }

    .hero {
      position: relative;
      height: 320px;
      background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1600&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: end;
      padding: 24px;
    }

    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      color: white;
    }

    .hero h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .hero p {
      opacity: 0.9;
      line-height: 1.6;
    }

    .container {
      max-width: 500px;
      margin: -40px auto 40px;
      position: relative;
      z-index: 5;
      padding: 0 16px;
    }

    .card {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      animation: fadeIn 0.5s ease;
    }

    .progress-wrap {
      margin-bottom: 24px;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 0.9rem;
      color: #7d6b5d;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: #eee;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #ff9a62, #ffcc80);
      transition: width 0.4s ease;
    }

    .question-image {
      width: 100%;
      height: 220px;
      border-radius: 20px;
      object-fit: cover;
      margin-bottom: 24px;
      transition: all 0.4s ease;
    }

    .question {
      font-size: 1.4rem;
      line-height: 1.5;
      margin-bottom: 24px;
      font-weight: 700;
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .answer-btn {
      border: none;
      background: white;
      border-radius: 18px;
      padding: 18px;
      text-align: left;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .answer-btn:hover {
      transform: translateY(-3px);
      background: #fff3eb;
    }

    .result {
      text-align: center;
    }

    .result h2 {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    .result img {
      width: 100%;
      border-radius: 24px;
      margin-bottom: 20px;
      height: 280px;
      object-fit: cover;
    }

    .result p {
      line-height: 1.8;
      color: #5c4a3c;
      margin-bottom: 20px;
    }

    /* 新增：個資表單樣式 */
    .form-group {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px dashed #d1c4b9;
      text-align: left;
    }

    .form-group h3 {
      font-size: 1.1rem;
      margin-bottom: 15px;
      color: #3b2f2f;
      text-align: center;
    }

    .form-group input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 1rem;
      outline: none;
    }

    .form-group input:focus {
      border-color: #ff9a62;
    }

    .submit-btn {
      background: #3b2f2f;
      color: white;
      border: none;
      padding: 14px;
      width: 100%;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .submit-btn:disabled {
      background: #ccc;
    }

    .restart-btn {
      border: 1px solid #ff9a62;
      background: transparent;
      color: #ff9a62;
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 0.9rem;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
      margin-top: 10px;
    }
    
    .loading-state {
      text-align: center;
      padding: 40px 20px;
      color: #7d6b5d;
      font-size: 1.1rem;
    }
    
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #ff9a62;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px auto;
    }
    
    .hidden {
      display: none !important;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero-content">
      <h1>芳香精油探索旅程</h1>
      <p>完成以下測驗，找到最適合你的專屬結果與圖片。</p>
    </div>
  </section>

  <div class="container">
    <div class="card">
      
      <div id="loadingState" class="loading-state">
        <div class="spinner"></div>
        <p>專屬題目讀取中請稍後...</p>
      </div>

      <div id="quizContent" class="hidden">
        <div class="progress-wrap">
          <div class="progress-text">
            <span id="stepText">第 1 題</span>
            <span id="percentText">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress" id="progress"></div>
          </div>
        </div>

        <img id="questionImage" class="question-image" src="">
        <div id="question" class="question"></div>
        <div id="answers" class="answers"></div>
      </div>

      <div class="result hidden" id="result">
        <h2 id="resultTitle">你的專屬結果</h2>
        <img id="resultImage" src="" alt="Result Image">
        <p id="resultDesc">結果說明文字...</p>

        <div class="form-group" id="dataForm">
          <h3>留下聯絡資訊，獲取老師專屬建議</h3>
          <input type="text" id="userName" placeholder="您的姓名">
          <input type="text" id="userContact" placeholder="電話或 Line ID">
          <button class="submit-btn" id="submitBtn" onclick="sendDataToGoogle()">送出資料並領取建議</button>
          <p id="statusMsg" style="font-size: 0.8rem; margin-top: 5px;"></p>
        </div>

        <button class="restart-btn" id="restartBtn" onclick="restartQuiz()">重新測驗</button>
      </div>

    </div>
  </div>

  <script>
    // 💡 1. 您的 Google Apps Script 網址
    const API_URL = "https://script.google.com/macros/s/AKfycbw5NZ0PD2KK7mpJU-ORNLBeBqP4tsZp2MSWK0MkvBZJ6YVM1uGDmOJB3Mabg012bnRI/exec";

    const resultOutcomes = {
      TypeA: {
        title: '海洋之息：舒緩放鬆',
        image: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1200&auto=format&fit=crop',
        desc: '你適合帶有放鬆與自然感的芳香精油，例如薰衣草、佛手柑與尤加利。你的能量像是一場慢旅行，適合海邊的溫暖陽光。'
      },
      TypeB: {
        title: '森林芬多精：安定專注',
        image: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1200&auto=format&fit=crop',
        desc: '你目前需要穩定與力量，木質調如雪松、檀香、檜木最適合你。像是在森林中漫步，讓大地給予你平靜的支撐。'
      },
      TypeC: {
        title: '陽光果園：充滿活力',
        image: 'https://images.unsplash.com/photo-1557800636-894a64c1696f?q=80&w=1200&auto=format&fit=crop',
        desc: '你需要一點能量的提振！甜橙、葡萄柚等柑橘調精油能為你帶來快樂與活力，一掃陰霾，迎接明亮的每一天。'
      }
    };

    let questions = []; 
    let current = 0;
    let scores = {};
    let finalKey = ""; // 存儲最終結果 Key

    const loadingState = document.getElementById('loadingState');
    const quizContent = document.getElementById('quizContent');
    const questionEl = document.getElementById('question');
    const answersEl = document.getElementById('answers');
    const imageEl = document.getElementById('questionImage');
    const progressEl = document.getElementById('progress');
    const stepText = document.getElementById('stepText');
    const percentText = document.getElementById('percentText');
    const resultEl = document.getElementById('result');

    async function fetchQuestions() {
      try {
        const response = await fetch(API_URL);
        const data = await response.json();
        if(data && data.length > 0) {
          questions = data;
        } else {
          throw new Error("Empty Data");
        }
      } catch (error) {
        console.warn("API Error, using fallback.");
        questions = [{q:'【連線異常】請重新確認試算表設定', image:'', answers:[]}];
      } finally {
        loadingState.classList.add('hidden');
        quizContent.classList.remove('hidden');
        initScores();
        renderQuestion();
      }
    }

    function initScores() {
      scores = {};
      Object.keys(resultOutcomes).forEach(key => scores[key] = 0);
    }

    function renderQuestion() {
      if (questions.length === 0) return;
      const q = questions[current];
      questionEl.innerText = q.q;
      imageEl.src = q.image || 'https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=800';
      answersEl.innerHTML = '';

      q.answers.filter(ans => ans.text).forEach(answer => {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.innerText = answer.text;
        btn.onclick = () => {
          scores[answer.value] = (scores[answer.value] || 0) + 1;
          nextQuestion();
        };
        answersEl.appendChild(btn);
      });

      const progress = ((current + 1) / questions.length) * 100;
      progressEl.style.width = progress + '%';
      stepText.innerText = `第 ${current + 1} 題 / ${questions.length} 題`;
      percentText.innerText = Math.round(progress) + '%';
    }

    function nextQuestion() {
      current++;
      if (current >= questions.length) { showResult(); return; }
      renderQuestion();
    }

    function showResult() {
      quizContent.classList.add('hidden');
      finalKey = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
      const outcome = resultOutcomes[finalKey] || resultOutcomes['TypeA'];

      document.getElementById('resultTitle').innerText = outcome.title;
      document.getElementById('resultImage').src = outcome.image;
      document.getElementById('resultDesc').innerText = outcome.desc;
      resultEl.classList.remove('hidden');
    }

    // 🚀 新增：發送資料到 Google 試算表
    function sendDataToGoogle() {
      const name = document.getElementById('userName').value;
      const contact = document.getElementById('userContact').value;
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('statusMsg');

      if (!name || !contact) {
        alert("請填寫姓名與聯絡方式喔！");
        return;
      }

      btn.disabled = true;
      msg.innerText = "傳送中...";

      const payload = {
        name: name,
        contact: contact,
        resultType: finalKey,
        resultTitle: resultOutcomes[finalKey].title
      };

      // 使用 POST 傳送
      fetch(API_URL, {
        method: 'POST',
        mode: 'no-cors', // 重要：避免跨網域錯誤
        body: JSON.stringify(payload)
      })
      .then(() => {
        msg.style.color = "green";
        msg.innerText = "✓ 資料已成功送出！老師將會聯絡您。";
        document.getElementById('dataForm').style.opacity = "0.6";
        btn.style.display = "none";
      })
      .catch(err => {
        console.error(err);
        msg.style.color = "red";
        msg.innerText = "傳送失敗，請稍後再試。";
        btn.disabled = false;
      });
    }

    function restartQuiz() {
      current = 0;
      initScores();
      document.getElementById('userName').value = "";
      document.getElementById('userContact').value = "";
      document.getElementById('submitBtn').style.display = "block";
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('statusMsg').innerText = "";
      document.getElementById('dataForm').style.opacity = "1";
      resultEl.classList.add('hidden');
      quizContent.classList.remove('hidden');
      renderQuestion();
    }

    fetchQuestions();
  </script>

</body>
</html>
