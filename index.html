<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>芳香精油探索旅程</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Noto Sans TC', sans-serif;
    }

    body {
      background: linear-gradient(180deg, #f6efe7 0%, #e9d9c6 100%);
      min-height: 100vh;
      overflow-x: hidden;
      color: #3b2f2f;
    }

    .hero {
      position: relative;
      height: 320px;
      background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1600&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: end;
      padding: 24px;
    }

    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      color: white;
    }

    .hero h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .hero p {
      opacity: 0.9;
      line-height: 1.6;
    }

    .container {
      max-width: 500px;
      margin: -40px auto 40px;
      position: relative;
      z-index: 5;
      padding: 0 16px;
    }

    .card {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      animation: fadeIn 0.5s ease;
    }

    .progress-wrap {
      margin-bottom: 24px;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 0.9rem;
      color: #7d6b5d;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: #eee;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #ff9a62, #ffcc80);
      transition: width 0.4s ease;
    }

    .question-image {
      width: 100%;
      height: 220px;
      border-radius: 20px;
      object-fit: cover;
      margin-bottom: 24px;
      transition: all 0.4s ease;
    }

    .question {
      font-size: 1.4rem;
      line-height: 1.5;
      margin-bottom: 24px;
      font-weight: 700;
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .answer-btn {
      border: none;
      background: white;
      border-radius: 18px;
      padding: 18px;
      text-align: left;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .answer-btn:hover {
      transform: translateY(-3px);
      background: #fff3eb;
    }

    .answer-btn:active {
      transform: scale(0.98);
    }

    .result {
      text-align: center;
    }

    .result h2 {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    .result img {
      width: 100%;
      border-radius: 24px;
      margin-bottom: 20px;
      height: 280px;
      object-fit: cover;
    }

    .result p {
      line-height: 1.8;
      color: #5c4a3c;
      margin-bottom: 20px;
    }

    .restart-btn {
      border: none;
      background: linear-gradient(90deg, #ff9a62, #ffb74d);
      color: white;
      padding: 16px 24px;
      border-radius: 999px;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
    }
    
    /* 新增：載入中狀態與隱藏區塊的樣式 */
    .loading-state {
      text-align: center;
      padding: 40px 20px;
      color: #7d6b5d;
      font-size: 1.1rem;
    }
    
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #ff9a62;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px auto;
    }
    
    .hidden {
      display: none !important;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media(max-width: 480px){
      .hero h1 {
        font-size: 1.7rem;
      }
      .question {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero-content">
      <h1>芳香精油探索旅程</h1>
      <p>完成以下測驗，找到最適合你的專屬結果與圖片。</p>
    </div>
  </section>

  <div class="container">
    <div class="card">
      
      <!-- 載入中畫面 -->
      <div id="loadingState" class="loading-state">
        <div class="spinner"></div>
        <p>正在從試算表讀取您的專屬題目...</p>
      </div>

      <!-- 測驗內容區塊 (預設隱藏，讀取完成後顯示) -->
      <div id="quizContent" class="hidden">
        <div class="progress-wrap">
          <div class="progress-text">
            <span id="stepText">第 1 題</span>
            <span id="percentText">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress" id="progress"></div>
          </div>
        </div>

        <img id="questionImage" class="question-image" src="">
        <div id="question" class="question"></div>
        <div id="answers" class="answers"></div>
      </div>

      <!-- 結果區塊 (預設隱藏) -->
      <div class="result hidden" id="result">
        <h2 id="resultTitle">你的專屬結果</h2>
        <img id="resultImage" src="" alt="Result Image">
        <p id="resultDesc">結果說明文字...</p>
        <button class="restart-btn" onclick="restartQuiz()">重新探索</button>
      </div>

    </div>
  </div>

  <script>
    // 💡 1. 【重要】請將這裡替換成您 Google Apps Script 的「網頁應用程式網址」
    const API_URL = "https://script.google.com/macros/s/AKfycbw5NZ0PD2KK7mpJU-ORNLBeBqP4tsZp2MSWK0MkvBZJ6YVM1uGDmOJB3Mabg012bnRI/exec";

    // 💡 2. 這裡設定您的「結果資料庫」(與上一版相同)
    const resultOutcomes = {
      TypeA: {
        title: '海洋之息：舒緩放鬆',
        image: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1200&auto=format&fit=crop',
        desc: '你適合帶有放鬆與自然感的芳香精油，例如薰衣草、佛手柑與尤加利。你的能量像是一場慢旅行，適合海邊的溫暖陽光。'
      },
      TypeB: {
        title: '森林芬多精：安定專注',
        image: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1200&auto=format&fit=crop',
        desc: '你目前需要穩定與力量，木質調如雪松、檀香、檜木最適合你。像是在森林中漫步，讓大地給予你平靜的支撐。'
      },
      TypeC: {
        title: '陽光果園：充滿活力',
        image: 'https://images.unsplash.com/photo-1557800636-894a64c1696f?q=80&w=1200&auto=format&fit=crop',
        desc: '你需要一點能量的提振！甜橙、葡萄柚等柑橘調精油能為你帶來快樂與活力，一掃陰霾，迎接明亮的每一天。'
      }
    };

    // 如果沒有串接 API 時的備用測試資料
    const fallbackQuestions = [
      {
        q: '【測試模式】旅行時，你最喜歡哪種景色？',
        image: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1200&auto=format&fit=crop',
        answers: [
          { text: '海島海景，聽海浪的聲音', value: 'TypeA' },
          { text: '森林步道，享受綠意盎然', value: 'TypeB' },
          { text: '充滿陽光的熱情城市', value: 'TypeC' }
        ]
      }
    ];

    let questions = []; 
    let current = 0;
    let scores = {};

    const loadingState = document.getElementById('loadingState');
    const quizContent = document.getElementById('quizContent');
    const questionEl = document.getElementById('question');
    const answersEl = document.getElementById('answers');
    const imageEl = document.getElementById('questionImage');
    const progressEl = document.getElementById('progress');
    const stepText = document.getElementById('stepText');
    const percentText = document.getElementById('percentText');
    const resultEl = document.getElementById('result');

    // 💡 3. 從 Google 試算表抓取資料
    async function fetchQuestions() {
      try {
        // 發送請求取得 JSON 資料
        const response = await fetch(API_URL);
        const data = await response.json();
        
        if(data && data.length > 0) {
          questions = data;
        } else {
          throw new Error("回傳資料為空");
        }
      } catch (error) {
        console.warn("無法取得試算表資料，啟用備用測試題庫。請確認 API_URL 是否正確。", error);
        questions = fallbackQuestions; // 發生錯誤時載入備用題庫
      } finally {
        // 隱藏載入中畫面，顯示測驗區塊
        loadingState.classList.add('hidden');
        quizContent.classList.remove('hidden');
        
        // 初始化計分板
        initScores();
        // 渲染第一題
        renderQuestion();
      }
    }

    function initScores() {
      scores = {};
      Object.keys(resultOutcomes).forEach(key => {
        scores[key] = 0;
      });
    }

    // 顯示題目
    function renderQuestion() {
      if (questions.length === 0) return;

      const q = questions[current];
      questionEl.innerText = q.q;
      imageEl.src = q.image;
      answersEl.innerHTML = '';

      // 動態產生選項按鈕，過濾掉沒有填寫的空白選項
      q.answers.filter(ans => ans.text).forEach(answer => {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.innerText = answer.text;

        btn.onclick = () => {
          // 為對應的類型加分
          if (scores[answer.value] !== undefined) {
             scores[answer.value]++;
          } else {
             scores[answer.value] = 1; 
          }
          nextQuestion();
        };

        answersEl.appendChild(btn);
      });

      // 更新進度條
      const progress = ((current + 1) / questions.length) * 100;
      progressEl.style.width = progress + '%';
      stepText.innerText = `第 ${current + 1} 題 / ${questions.length} 題`;
      percentText.innerText = Math.round(progress) + '%';
    }

    // 進入下一題或顯示結果
    function nextQuestion() {
      current++;
      if (current >= questions.length) {
        showResult();
        return;
      }
      renderQuestion();
    }

    // 計算並顯示最終結果
    function showResult() {
      quizContent.classList.add('hidden');

      // 找出最高分的類型
      let highestType = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
      
      // 取得對應的結果資料，如果試算表填了未知的 Type，則預設給 TypeA
      const finalOutcome = resultOutcomes[highestType] || resultOutcomes['TypeA'];

      document.getElementById('resultTitle').innerText = finalOutcome.title;
      document.getElementById('resultImage').src = finalOutcome.image;
      document.getElementById('resultDesc').innerText = finalOutcome.desc;

      resultEl.classList.remove('hidden');
    }

    // 重新測驗
    function restartQuiz() {
      current = 0;
      initScores();
      resultEl.classList.add('hidden');
      quizContent.classList.remove('hidden');
      renderQuestion();
    }

    // 網頁載入時啟動資料抓取
    fetchQuestions();
  </script>

</body>
</html>
